<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barmods Tunnel | VIP Network Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@500;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #030712; 
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Tech Grid & Animated Glow Background */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 20% 40%, rgba(6, 182, 212, 0.12), transparent 40%),
                        radial-gradient(circle at 80% 60%, rgba(139, 92, 246, 0.12), transparent 40%);
            animation: breathe 8s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* Ultra Premium Glass Card */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1),
                        inset 0 0 20px rgba(6, 182, 212, 0.05);
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }
        .font-mono-code { font-family: 'JetBrains Mono', monospace; }
        
        .text-glow {
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
        }

        /* Input VIP Styling */
        .input-vip {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-vip:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
            outline: none;
        }
        select option { background-color: #0f172a; color: #fff; }

        /* Button Gradient */
        .btn-vip {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            background-size: 200% auto;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }
        .btn-vip:hover {
            background-position: right center;
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Tab Switcher */
        .tab-btn { transition: all 0.3s ease; }
        .tab-active { background: rgba(0, 242, 254, 0.15); color: #00f2fe; border: 1px solid rgba(0, 242, 254, 0.3); }
        .tab-inactive { color: #64748b; border: 1px solid transparent; }
        .tab-inactive:hover { color: #cbd5e1; background: rgba(255,255,255,0.05); }

        .hidden-element { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-8">

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="glass-panel w-full max-w-3xl rounded-[2rem] p-6 sm:p-10 relative z-10">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan-500/20 to-blue-500/20 border border-cyan-500/30 mb-4 shadow-[0_0_30px_rgba(6,182,212,0.3)]">
                <i class="fa-solid fa-server text-3xl text-cyan-400"></i>
            </div>
            <h1 class="text-4xl sm:text-5xl font-outfit font-black text-glow tracking-tight uppercase">BARMODS TUNNEL</h1>
            <p class="text-sm text-slate-400 font-medium tracking-widest uppercase mt-2">
                VIP Network & Data Center
            </p>
        </div>

        <!-- Tab Navigation -->
        <div class="flex space-x-2 bg-[#020617] p-1.5 rounded-xl mb-8 border border-slate-800 shadow-inner">
            <button id="btnTabVpn" onclick="switchTab('vpn')" class="tab-btn tab-active w-1/2 py-3 rounded-lg font-bold text-sm tracking-wide flex justify-center items-center gap-2">
                <i class="fa-solid fa-network-wired"></i> VPN PANEL
            </button>
            <button id="btnTabTools" onclick="switchTab('tools')" class="tab-btn tab-inactive w-1/2 py-3 rounded-lg font-bold text-sm tracking-wide flex justify-center items-center gap-2">
                <i class="fa-solid fa-satellite-dish"></i> IP LOOKUP
            </button>
        </div>

        <!-- ==============================
             SECTION 1: VPN PANEL FORM
             ============================== -->
        <div id="sectionVpn" class="transition-all duration-500">
            <form id="vpnForm" class="space-y-6">
                <!-- Row 1 -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs text-slate-500 font-bold mb-2 uppercase tracking-widest pl-1">Command Action</label>
                        <div class="relative">
                            <i class="fa-solid fa-terminal absolute left-4 top-1/2 -translate-y-1/2 text-cyan-500"></i>
                            <select id="action" class="input-vip w-full rounded-xl p-3.5 pl-11 appearance-none cursor-pointer">
                                <option value="create">Deploy New Server</option>
                                <option value="trial">Generate Trial</option>
                                <option value="renew">Renew Access</option>
                                <option value="delete">Destroy Account</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-600"></i>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 font-bold mb-2 uppercase tracking-widest pl-1">Tunnel Protocol</label>
                        <div class="relative">
                            <i class="fa-solid fa-shield-halved absolute left-4 top-1/2 -translate-y-1/2 text-blue-400"></i>
                            <select id="protocol" class="input-vip w-full rounded-xl p-3.5 pl-11 appearance-none cursor-pointer">
                                <option value="vmess">VMESS (Xray)</option>
                                <option value="vless">VLESS (Xray)</option>
                                <option value="trojan">TROJAN (Xray)</option>
                                <option value="ssh">SSH / OVPN</option>
                                <option value="shadowsocks">SHADOWSOCKS</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-600"></i>
                        </div>
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs text-slate-500 font-bold mb-2 uppercase tracking-widest pl-1">Client Username</label>
                        <div class="relative">
                            <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                            <input type="text" id="username" placeholder="Username..." required class="input-vip w-full rounded-xl p-3.5 pl-11">
                        </div>
                    </div>
                    <div id="passGroup" class="hidden-element">
                        <label class="block text-xs text-slate-500 font-bold mb-2 uppercase tracking-widest pl-1">SSH Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-fingerprint absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                            <input type="text" id="password" placeholder="Password..." class="input-vip w-full rounded-xl p-3.5 pl-11">
                        </div>
                    </div>
                </div>

                <!-- Row 3 -->
                <div class="grid grid-cols-3 gap-4" id="detailGroup">
                    <div>
                        <label class="block text-xs text-slate-500 font-bold mb-2 uppercase tracking-widest pl-1">Validity (Days)</label>
                        <div class="relative">
                            <i class="fa-regular fa-clock absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                            <input type="number" id="exp" value="30" class="input-vip w-full rounded-xl p-3.5 pl-9 sm:pl-11 text-center font-bold">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 font-bold mb-2 uppercase tracking-widest pl-1">Device Limit</label>
                        <div class="relative">
                            <i class="fa-solid fa-microchip absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                            <input type="number" id="iplimit" value="2" class="input-vip w-full rounded-xl p-3.5 pl-9 sm:pl-11 text-center font-bold">
                        </div>
                    </div>
                    <div id="quotaGroup">
                        <label class="block text-xs text-slate-500 font-bold mb-2 uppercase tracking-widest pl-1">Bandwidth (GB)</label>
                        <div class="relative">
                            <i class="fa-solid fa-wifi absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                            <input type="number" id="quota" value="0" placeholder="0 = Unli" class="input-vip w-full rounded-xl p-3.5 pl-9 sm:pl-11 text-center font-bold">
                        </div>
                    </div>
                </div>

                <button type="submit" id="btnSubmitVpn" class="btn-vip w-full mt-4 text-white font-outfit font-bold tracking-widest text-lg py-4 rounded-xl flex justify-center items-center gap-3">
                    <i class="fa-solid fa-bolt"></i> EXECUTE DEPLOYMENT
                </button>
            </form>
        </div>

        <!-- ==============================
             SECTION 2: IP LOOKUP FORM
             ============================== -->
        <div id="sectionTools" class="hidden-element transition-all duration-500">
            <form id="toolsForm" class="space-y-6">
                <div>
                    <label class="block text-xs text-slate-500 font-bold mb-2 uppercase tracking-widest pl-1">Target IP Address / Domain</label>
                    <div class="relative">
                        <i class="fa-solid fa-globe absolute left-4 top-1/2 -translate-y-1/2 text-cyan-500"></i>
                        <input type="text" id="ipTarget" placeholder="Contoh: 8.8.8.8 atau google.com" required class="input-vip w-full rounded-xl p-4 pl-12 font-mono-code">
                    </div>
                    <p class="text-xs text-slate-500 mt-2 pl-1"><i class="fa-solid fa-circle-info"></i> Sistem akan melacak detail ISP, Negara, Kota, dan Koordinat dari IP target.</p>
                </div>

                <button type="submit" id="btnSubmitTools" class="btn-vip w-full text-white font-outfit font-bold tracking-widest text-lg py-4 rounded-xl flex justify-center items-center gap-3">
                    <i class="fa-solid fa-radar"></i> START TRACKING
                </button>
            </form>
        </div>

        <!-- ==============================
             UNIVERSAL TERMINAL RESULT BOX
             ============================== -->
        <div id="resultBox" class="mt-10 hidden-element relative z-10 transition-all duration-500">
            <!-- Terminal Header -->
            <div class="bg-[#0f172a] rounded-t-xl px-4 py-3 flex items-center border border-b-0 border-slate-700/50">
                <div class="flex gap-2 w-20">
                    <div class="w-3.5 h-3.5 rounded-full bg-red-500/80 border border-red-500/50 shadow-[0_0_10px_rgba(239,68,68,0.4)]"></div>
                    <div class="w-3.5 h-3.5 rounded-full bg-yellow-500/80 border border-yellow-500/50 shadow-[0_0_10px_rgba(234,179,8,0.4)]"></div>
                    <div class="w-3.5 h-3.5 rounded-full bg-green-500/80 border border-green-500/50 shadow-[0_0_10px_rgba(34,197,94,0.4)]"></div>
                </div>
                <div class="flex-1 text-center text-xs font-mono-code text-slate-500 tracking-wider">root@barmods-server:~#</div>
                <div class="w-20 text-right">
                    <button onclick="copyResult()" class="text-xs bg-slate-800 hover:bg-slate-700 transition px-3 py-1.5 rounded border border-slate-700 text-slate-300 flex items-center gap-2 ml-auto">
                        <i class="fa-regular fa-copy"></i> Copy
                    </button>
                </div>
            </div>
            <!-- Terminal Body -->
            <div class="bg-[#020617] border border-slate-700/50 p-1 rounded-b-xl relative shadow-2xl">
                <!-- Scanline effect -->
                <div class="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_4px,3px_100%] z-10 pointer-events-none opacity-20"></div>
                
                <pre id="outputText" class="p-5 text-[#00ff41] font-mono-code text-sm overflow-x-auto whitespace-pre-wrap leading-relaxed relative z-20"></pre>
            </div>
        </div>
    </div>

    <script>
        // Tab Management Logic
        const btnTabVpn = document.getElementById('btnTabVpn');
        const btnTabTools = document.getElementById('btnTabTools');
        const sectionVpn = document.getElementById('sectionVpn');
        const sectionTools = document.getElementById('sectionTools');
        const resultBox = document.getElementById('resultBox');
        const outputText = document.getElementById('outputText');

        function switchTab(tab) {
            resultBox.classList.add('hidden-element'); // Sembunyikan result saat ganti tab
            if (tab === 'vpn') {
                btnTabVpn.className = 'tab-btn tab-active w-1/2 py-3 rounded-lg font-bold text-sm tracking-wide flex justify-center items-center gap-2';
                btnTabTools.className = 'tab-btn tab-inactive w-1/2 py-3 rounded-lg font-bold text-sm tracking-wide flex justify-center items-center gap-2';
                sectionVpn.classList.remove('hidden-element');
                sectionTools.classList.add('hidden-element');
            } else {
                btnTabTools.className = 'tab-btn tab-active w-1/2 py-3 rounded-lg font-bold text-sm tracking-wide flex justify-center items-center gap-2';
                btnTabVpn.className = 'tab-btn tab-inactive w-1/2 py-3 rounded-lg font-bold text-sm tracking-wide flex justify-center items-center gap-2';
                sectionTools.classList.remove('hidden-element');
                sectionVpn.classList.add('hidden-element');
            }
        }

        // VPN Form Dynamic Fields Logic
        const actionSel = document.getElementById('action');
        const protocolSel = document.getElementById('protocol');
        const passGroup = document.getElementById('passGroup');
        const detailGroup = document.getElementById('detailGroup');
        const quotaGroup = document.getElementById('quotaGroup');

        const updateFormVisibility = () => {
            const action = actionSel.value;
            const protocol = protocolSel.value;

            if (action === 'delete') {
                detailGroup.classList.add('hidden-element');
                passGroup.classList.add('hidden-element');
            } else {
                detailGroup.classList.remove('hidden-element');
                if (protocol === 'ssh' && action !== 'renew') {
                    passGroup.classList.remove('hidden-element');
                } else {
                    passGroup.classList.add('hidden-element');
                }
                if (protocol === 'ssh') {
                    quotaGroup.classList.add('hidden-element');
                } else {
                    quotaGroup.classList.remove('hidden-element');
                }
            }
        };

        actionSel.addEventListener('change', updateFormVisibility);
        protocolSel.addEventListener('change', updateFormVisibility);
        updateFormVisibility(); 

        // ==========================================
        // HANDLER 1: SUBMIT VPN FORM
        // ==========================================
        document.getElementById('vpnForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitVpn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> DEPLOYING...';
            btn.classList.add('opacity-75', 'cursor-wait');
            resultBox.classList.add('hidden-element');

            const payload = {
                action: actionSel.value,
                protocol: protocolSel.value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                exp: document.getElementById('exp').value,
                quota: document.getElementById('quota').value,
                iplimit: document.getElementById('iplimit').value
            };

            try {
                // Menembak ke backend Vercel (api/vpn.js)
                const response = await fetch('/api/vpn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const resData = await response.json();
                resultBox.classList.remove('hidden-element');
                
                if (resData.status === 'success') {
                    outputText.classList.replace('text-red-500', 'text-[#00ff41]');
                    outputText.innerText = formatVpnOutput(payload.action, payload.protocol, resData.data || resData);
                } else {
                    outputText.classList.replace('text-[#00ff41]', 'text-red-500');
                    outputText.innerText = "[!] SYSTEM ERROR:\n" + (resData.message || JSON.stringify(resData));
                }
            } catch (err) {
                resultBox.classList.remove('hidden-element');
                outputText.classList.replace('text-[#00ff41]', 'text-red-500');
                outputText.innerText = "[!] CONNECTION LOST TO SERVER:\n" + err.message;
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-bolt"></i> EXECUTE DEPLOYMENT';
                btn.classList.remove('opacity-75', 'cursor-wait');
                resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        });

        // ==========================================
        // HANDLER 2: SUBMIT IP LOOKUP FORM
        // ==========================================
        document.getElementById('toolsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitTools');
            const targetIp = document.getElementById('ipTarget').value.trim();
            
            btn.innerHTML = '<i class="fa-solid fa-radar fa-spin"></i> TRACKING IP...';
            btn.classList.add('opacity-75', 'cursor-wait');
            resultBox.classList.add('hidden-element');

            try {
                // Track IP Menggunakan API Publik Gratis
                const response = await fetch(`https://ipwho.is/${targetIp}`);
                const data = await response.json();
                
                resultBox.classList.remove('hidden-element');

                if (data.success) {
                    outputText.classList.replace('text-red-500', 'text-[#00ff41]');
                    outputText.innerText = `[+] TARGET ACQUIRED: ${data.ip}\n==========================================\n> NETWORK INFORMATION\n  ISP       : ${data.connection.isp}\n  ASN       : ${data.connection.asn}\n  Org       : ${data.connection.org}\n  Type      : ${data.type}\n\n> LOCATION DATA\n  Country   : ${data.country} (${data.country_code}) \n  Region    : ${data.region}\n  City      : ${data.city}\n  ZIP/Post  : ${data.postal}\n  Timezone  : ${data.timezone.id} (UTC ${data.timezone.utc})\n\n> GEO-COORDINATES\n  Latitude  : ${data.latitude}\n  Longitude : ${data.longitude}\n  Maps Link : https://www.google.com/maps?q=${data.latitude},${data.longitude}\n==========================================\n[OK] TRACKING COMPLETED.`;
                } else {
                    outputText.classList.replace('text-[#00ff41]', 'text-red-500');
                    outputText.innerText = `[!] TRACKING FAILED:\nInvalid IP or Domain (${data.message})`;
                }
            } catch (err) {
                resultBox.classList.remove('hidden-element');
                outputText.classList.replace('text-[#00ff41]', 'text-red-500');
                outputText.innerText = "[!] TRACKING ERROR:\nNetwork connection blocked or API down.";
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-radar"></i> START TRACKING';
                btn.classList.remove('opacity-75', 'cursor-wait');
                resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        });

        // Formatter untuk output VPN
        function formatVpnOutput(action, protocol, data) {
            if (action === 'delete') return `[OK] SUCCESS: Akun ${data.username || ''} telah dihapus dari database.`;
            if (action === 'renew') return `[OK] RENEW SUCCESS:\n==========================================\n  Username  : ${data.username || ''}\n  Exp. Baru : ${data.expired || ''}\n==========================================`;
            
            let text = `==========================================\n       [ NEW ${protocol.toUpperCase()} ACCOUNT ]\n==========================================\n`;
            for (const [key, value] of Object.entries(data)) {
                let padKey = key.toUpperCase().replace('_', ' ').padEnd(14, ' ');
                text += `> ${padKey} : ${value}\n`;
            }
            text += `==========================================\nSTATUS: ONLINE & SECURED.`;
            return text;
        }

        // Fitur Copy
        function copyResult() {
            navigator.clipboard.writeText(outputText.innerText);
            const btn = document.querySelector('#resultBox button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check text-green-400"></i> Copied';
            btn.classList.replace('text-slate-300', 'text-green-400');
            setTimeout(() => { 
                btn.innerHTML = originalHTML; 
                btn.classList.replace('text-green-400', 'text-slate-300');
            }, 2000);
        }
    </script>
</body>
</html>
